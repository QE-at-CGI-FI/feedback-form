<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibe Coding Feedback</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape shape-one" aria-hidden="true"></div>
    <div class="bg-shape shape-two" aria-hidden="true"></div>

    <main class="app-shell">
      <header class="hero reveal" style="--delay: 0.04s">
        <p class="eyebrow">Session Retrospective</p>
        <h1>Vibe Coding Feedback</h1>
        <p class="subtitle">
          Rate this coding session and capture how to make the next one even better.
        </p>
      </header>

      <section class="panel reveal" style="--delay: 0.12s" aria-labelledby="feedback-title">
        <h2 id="feedback-title">Add Feedback</h2>

        <form id="feedback-form" class="feedback-form" autocomplete="off">
          <div class="field">
            <label class="label">How did this session go?</label>
            <div class="star-picker" role="radiogroup" aria-label="Star rating">
              <button type="button" class="star" data-value="1" aria-label="1 star">★</button>
              <button type="button" class="star" data-value="2" aria-label="2 stars">★</button>
              <button type="button" class="star" data-value="3" aria-label="3 stars">★</button>
              <button type="button" class="star" data-value="4" aria-label="4 stars">★</button>
              <button type="button" class="star" data-value="5" aria-label="5 stars">★</button>
            </div>
            <p id="rating-text" class="helper">No score selected yet.</p>
          </div>

          <div class="field">
            <label for="ideas" class="label">What should we do better next time?</label>
            <textarea
              id="ideas"
              name="ideas"
              rows="4"
              placeholder="Examples: clearer requirements upfront, more small commits, faster iteration checkpoints..."
            ></textarea>
          </div>

          <div class="actions">
            <button type="submit" class="btn btn-primary">Save Feedback</button>
            <button type="button" id="clear-all" class="btn btn-ghost">Clear All</button>
          </div>
        </form>
      </section>

      <section class="panel reveal" style="--delay: 0.2s" aria-labelledby="summary-title">
        <div class="summary-head">
          <h2 id="summary-title">Summary</h2>
          <p id="summary-meta">No feedback yet.</p>
        </div>
        <div class="stats-grid">
          <article class="stat-card">
            <p class="stat-label">Average</p>
            <p id="avg-rating" class="stat-value">0.0</p>
          </article>
          <article class="stat-card">
            <p class="stat-label">Entries</p>
            <p id="entry-count" class="stat-value">0</p>
          </article>
        </div>
      </section>

      <section class="panel reveal" style="--delay: 0.28s" aria-labelledby="history-title">
        <h2 id="history-title">Feedback History</h2>
        <ul id="feedback-list" class="feedback-list"></ul>
      </section>
    </main>

    <template id="entry-template">
      <li class="entry">
        <div class="entry-head">
          <p class="entry-rating"></p>
          <p class="entry-date"></p>
        </div>
        <p class="entry-ideas"></p>
      </li>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
